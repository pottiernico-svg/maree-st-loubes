<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marée Dordogne</title>

<style>
:root{
  --blue:#007aff;
  --green:#34c759;
  --orange:#ff9500;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(160deg,#eef6ff,#dbeafe);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.app{
  width:100%;
  max-width:460px;
  display:grid;
  gap:16px;
}

.card{
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(24px);
  border-radius:32px;
  box-shadow:0 18px 50px rgba(15,23,42,.12);
  padding:22px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.title{
  font-size:31px;
  font-weight:850;
  letter-spacing:-1px;
}

.sub{
  color:var(--muted);
  margin-top:3px;
}

.badge{
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  background:rgba(0,122,255,.12);
  color:var(--blue);
}

svg{
  width:100%;
  height:245px;
  margin-top:12px;
}

.main{
  text-align:center;
}

.status{
  min-height:32px;
  font-size:25px;
  font-weight:850;
}

.window{
  margin-top:8px;
  color:var(--muted);
  font-size:18px;
}

.timer{
  margin-top:10px;
  font-size:34px;
  font-weight:850;
  letter-spacing:-1px;
}

.progress{
  margin-top:18px;
  height:14px;
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:var(--green);
  border-radius:999px;
  transition:width .4s ease;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.metric{
  background:rgba(255,255,255,.9);
  border-radius:24px;
  padding:16px;
  min-height:84px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.icon{
  font-size:28px;
}

.value{
  margin-top:6px;
  font-size:22px;
  font-weight:850;
}

.metric-label{
  margin-top:2px;
  color:var(--muted);
  font-size:13px;
}

.footer{
  text-align:center;
  color:var(--muted);
  font-size:12px;
}
</style>
</head>

<body>

<main class="app">

<section class="card">
  <div class="header">
    <div>
      <div class="title">Marée</div>
      <div class="sub">Ponton Saint-Loubès</div>
    </div>
    <div class="badge" id="phase">--</div>
  </div>

  <svg viewBox="0 0 380 250" preserveAspectRatio="none">
    <line x1="45" y1="30" x2="45" y2="205" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="45" y1="205" x2="360" y2="205" stroke="#cbd5e1" stroke-width="1"/>

    <g id="yAxis"></g>
    <g id="xAxis"></g>

    <path id="fill" fill="rgba(0,122,255,.16)"></path>
    <path id="wave" stroke="#007aff" stroke-width="5" fill="none" stroke-linecap="round"></path>
    <circle id="dot" r="7" fill="#007aff" stroke="white" stroke-width="4"></circle>

    <text id="currentHeight" x="190" y="24" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">-- m</text>
  </svg>
</section>

<section class="card main">
  <div class="status" id="status"></div>
  <div class="window" id="calmWindow">--</div>
  <div class="timer" id="timer">--</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</section>

<section class="grid">

  <div class="metric">
    <div class="icon" id="weatherIcon">☀️</div>
    <div class="value" id="airTemp">--°C</div>
    <div class="metric-label">Air</div>
  </div>

  <div class="metric">
    <div class="icon">↕️</div>
    <div class="value" id="coef">--</div>
    <div class="metric-label">Coefficient</div>
  </div>

  <div class="metric">
    <div class="icon">💨</div>
    <div class="value" id="wind">--</div>
    <div class="metric-label">Vent</div>
  </div>

  <div class="metric">
    <div class="icon">🌊</div>
    <div class="value" id="heightMetric">-- m</div>
    <div class="metric-label">Hauteur</div>
  </div>

</section>

<div class="footer">Hauteur estimée au ponton · offset +20 min</div>

</main>

<script>
let tides = [];
let currentWind = null;

const CURRENT_DELAY_MINUTES = 40;

async function loadData(){
  const res = await fetch("data/tides.json?nocache=" + Date.now());
  const data = await res.json();

  tides = data.events.map(e => ({
    ...e,
    date: new Date(e.timeLocal)
  }));

  update();
}

function nextHigh(){
  const now = new Date();
  return tides.find(e => e.type === "high" && e.date > now);
}

function relevantHigh(){
  const now = new Date();

  const previousHigh = [...tides].reverse().find(e =>
    e.type === "high" && e.date <= now
  );

  if(previousHigh){
    const calm = calmWindowAround(previousHigh);

    if(now >= calm.start && now <= calm.end){
      return previousHigh;
    }
  }

  return nextHigh();
}

function lastHigh(){
  const now = new Date();
  return [...tides].reverse().find(e => e.type === "high" && e.date <= now);
}

function lastLow(){
  const now = new Date();
  return [...tides].reverse().find(e => e.type === "low" && e.date <= now);
}

function calmWindowAround(high){
  let before = 20;
  let after = 70;

  const coeff = high.coeff;

  if(coeff){
    if(coeff < 50){
      before = 30;
      after = 80;
    }else if(coeff > 80){
      before = 10;
      after = 60;
    }
  }

  if(currentWind !== null){
    if(currentWind > 22){
      before -= 5;
      after -= 10;
    }
    if(currentWind > 30){
      before -= 5;
      after -= 10;
    }
  }

  before = Math.max(5, before);
  after = Math.max(30, after);

  return {
    start: new Date(high.date.getTime() - before * 60000),
    end: new Date(high.date.getTime() + after * 60000)
  };
}

function formatDuration(ms){
  const totalMin = Math.max(0, Math.floor(ms / 60000));
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;

  if(h > 0) return `${h}h ${String(m).padStart(2,"0")}m`;
  return `${m} min`;
}

function interpolateHeightAt(date){
  const prev = [...tides].reverse().find(e => e.date <= date);
  const next = tides.find(e => e.date > date);

  if(!prev || !next) return null;

  const ratio = Math.max(0, Math.min(1, (date - prev.date) / (next.date - prev.date)));
  const smooth = 0.5 - 0.5 * Math.cos(Math.PI * ratio);

  return prev.height + (next.height - prev.height) * smooth;
}

function mapHeight(height,minH,maxH){
  const top = 38;
  const bottom = 205;
  return bottom - ((height - minH) / (maxH - minH)) * (bottom - top);
}

function drawAxes(minH,maxH){
  const yAxis = document.getElementById("yAxis");
  const xAxis = document.getElementById("xAxis");

  yAxis.innerHTML = "";
  xAxis.innerHTML = "";

  for(let h=Math.ceil(minH); h<=Math.floor(maxH); h++){
    const y = mapHeight(h,minH,maxH);
    yAxis.innerHTML += `
      <line x1="45" y1="${y}" x2="360" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>
      <text x="7" y="${y+4}" font-size="11" fill="#64748b">${h}m</text>
    `;
  }

  [["-6h",45],["Maint.",190],["+6h",335]].forEach(([label,x])=>{
    xAxis.innerHTML += `
      <text x="${x}" y="228" text-anchor="middle" font-size="11" fill="#64748b">${label}</text>
    `;
  });
}

function drawWave(){
  if(tides.length < 2) return;

  const now = new Date();
  const start = new Date(now.getTime() - 6 * 3600000);
  const end = new Date(now.getTime() + 6 * 3600000);

  const heights = tides.map(e => e.height);
  const minH = Math.max(0, Math.floor(Math.min(...heights)));
  const maxH = Math.ceil(Math.max(...heights));

  drawAxes(minH,maxH);

  let path = "";
  const xStart = 45;
  const xEnd = 360;

  for(let x=xStart; x<=xEnd; x+=4){
    const ratio = (x-xStart)/(xEnd-xStart);
    const t = new Date(start.getTime() + ratio * (end-start));
    const h = interpolateHeightAt(t);

    if(h === null) continue;

    const y = mapHeight(h,minH,maxH);
    path += path === "" ? `M ${x} ${y}` : ` L ${x} ${y}`;
  }

  document.getElementById("wave").setAttribute("d",path);
  document.getElementById("fill").setAttribute("d",`${path} L 360 205 L 45 205 Z`);

  const hNow = interpolateHeightAt(now);

  if(hNow !== null){
    const yNow = mapHeight(hNow,minH,maxH);

    document.getElementById("dot").setAttribute("cx",190);
    document.getElementById("dot").setAttribute("cy",yNow);
    document.getElementById("currentHeight").textContent = hNow.toFixed(1) + " m";
    document.getElementById("heightMetric").textContent = hNow.toFixed(1) + " m";
  }
}

function updatePhase(){
  const now = new Date();
  const high = lastHigh();
  const low = lastLow();

  if(high && now - high.date < CURRENT_DELAY_MINUTES * 60000){
    document.getElementById("phase").textContent = "Étale";
  }else if(low && (!high || low.date > high.date)){
    document.getElementById("phase").textContent = "Montante";
  }else{
    document.getElementById("phase").textContent = "Descendante";
  }
}

function update(){
  const high = relevantHigh();

  if(!high){
    document.getElementById("status").textContent = "";
    document.getElementById("timer").textContent = "Données à mettre à jour";
    return;
  }

  const now = new Date();
  const calm = calmWindowAround(high);
  const startCalm = calm.start;
  const endCalm = calm.end;

  const before = now < startCalm;
  const during = now >= startCalm && now <= endCalm;

  document.getElementById("calmWindow").textContent =
    startCalm.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}) +
    " → " +
    endCalm.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});

  document.getElementById("coef").textContent =
    high.coeff ? high.coeff : "--";

  const status = document.getElementById("status");
  const progressBar = document.getElementById("progressBar");

  let progress = 0;

  if(during){
    progress = ((now - startCalm) / (endCalm - startCalm)) * 100;

    if(currentWind !== null && currentWind > 22){
      status.textContent = "🟡 Eau calme mais ventée";
      status.style.color = "#ff9500";
      progressBar.style.background = "#ff9500";
    }else{
      status.textContent = "🟢 Eau calme";
      status.style.color = "#34c759";
      progressBar.style.background = "#34c759";
    }

    document.getElementById("timer").textContent =
      "Fin dans " + formatDuration(endCalm - now);

  }else if(before){
    const timeBefore = startCalm - now;

    if(timeBefore <= 2 * 3600000){
      status.textContent = "🟡 Bientôt favorable";
      status.style.color = "#ff9500";
      progressBar.style.background = "#ff9500";

      document.getElementById("timer").textContent =
        "Début dans " + formatDuration(timeBefore);
    }else{
      status.textContent = "";
      progressBar.style.background = "#007aff";

      document.getElementById("timer").textContent =
        "Dans " + formatDuration(timeBefore);
    }

  }else{
  status.textContent = "";

  const next = nextHigh();

  if(next){
    const nextCalm = calmWindowAround(next);

    document.getElementById("timer").textContent =
      "Dans " + formatDuration(nextCalm.start - now);
  }

  progress = 0;
}
  }

  progressBar.style.width =
    Math.max(0, Math.min(100, progress)) + "%";

  updatePhase();
  drawWave();
}

async function loadWeather(){
  try{
    const url =
      "https://api.open-meteo.com/v1/forecast" +
      "?latitude=44.934778" +
      "&longitude=-0.445861" +
      "&current=temperature_2m,weather_code,wind_speed_10m" +
      "&timezone=Europe%2FParis";

    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const wind = Math.round(data.current.wind_speed_10m);
    const code = data.current.weather_code;

    currentWind = wind;

    document.getElementById("airTemp").textContent = temp + "°C";
    document.getElementById("wind").textContent = wind + " km/h";
    document.getElementById("weatherIcon").textContent = weatherIcon(code);

    update();

  }catch(e){
    document.getElementById("airTemp").textContent = "--°C";
  }
}

function weatherIcon(code){
  if(code === 0) return "☀️";
  if(code <= 3) return "⛅";
  if(code <= 48) return "🌫️";
  if(code <= 67) return "🌧️";
  if(code <= 77) return "❄️";
  if(code <= 82) return "🌦️";
  if(code <= 99) return "⛈️";
  return "🌤️";
}

loadData();
loadWeather();

setInterval(update,1000);
setInterval(loadWeather,15 * 60 * 1000);
</script>

</body>
</html>
