<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marée Dordogne</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(160deg,#eef6ff,#dbeafe);
  color:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
}

.app{
  width:100%;
  max-width:430px;
  min-height:calc(100vh - 36px);
  display:grid;
  grid-template-rows:1fr .9fr;
  gap:18px;
}

.card{
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(24px);
  border-radius:34px;
  box-shadow:0 18px 50px rgba(15,23,42,.12);
  padding:24px;
}

.title{
  font-size:32px;
  font-weight:800;
}

.sub{
  color:#64748b;
  margin-top:4px;
}

svg{
  width:100%;
  height:230px;
  margin-top:20px;
}

.bottom{
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.label{
  color:#64748b;
  font-weight:600;
}

.timer{
  margin-top:12px;
  font-size:52px;
  font-weight:850;
  letter-spacing:-2px;
}

.time{
  margin-top:8px;
  color:#64748b;
  font-size:18px;
}

.status{
  margin:22px auto 0;
  padding:12px 16px;
  border-radius:18px;
  font-weight:700;
  width:fit-content;
  background:rgba(0,122,255,.12);
  color:#007aff;
}
</style>
</head>

<body>

<main class="app">

<section class="card">
  <div class="title">Marée</div>
  <div class="sub">Ponton Saint-Loubès</div>

  <svg viewBox="0 0 360 230" preserveAspectRatio="none">
    <path id="fill" fill="rgba(0,122,255,.16)"></path>
    <path id="wave" stroke="#007aff" stroke-width="5" fill="none" stroke-linecap="round"></path>
    <circle id="dot" r="7" fill="#007aff" stroke="white" stroke-width="4"></circle>
  </svg>
</section>

<section class="card bottom">
  <div class="label">Prochaine marée haute</div>
  <div class="timer" id="timer">--</div>
  <div class="time" id="nextTime">Chargement...</div>
  <div class="status" id="status">Calcul en cours</div>
</section>

</main>

<script>
let tides = [];

async function loadData(){
  const res = await fetch("data/tides.json?nocache=" + Date.now());
  const data = await res.json();
  tides = data.events.map(e => ({
    ...e,
    date: new Date(e.timeLocal)
  }));
  update();
}

function nextHigh(){
  const now = new Date();
  return tides.find(e => e.type === "high" && e.date > now);
}

function previousEvent(){
  const now = new Date();
  return [...tides].reverse().find(e => e.date <= now);
}

function drawWave(progress){
  const width = 360;
  const height = 230;
  const base = 125;
  const amplitude = 60;

  let path = "";
  let dotY = base;

  for(let x=0; x<=width; x+=6){
    const ratio = x / width;
    const y = base - amplitude * Math.sin((ratio - progress) * Math.PI * 2);
    path += x === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`;

    if(Math.abs(ratio - 0.5) < 0.01){
      dotY = y;
    }
  }

  document.getElementById("wave").setAttribute("d", path);
  document.getElementById("fill").setAttribute("d", `${path} L ${width} ${height} L 0 ${height} Z`);
  document.getElementById("dot").setAttribute("cx", 180);
  document.getElementById("dot").setAttribute("cy", dotY);
}

function update(){
  const high = nextHigh();

  if(!high){
    document.getElementById("timer").textContent = "--";
    document.getElementById("nextTime").textContent = "Données à mettre à jour";
    return;
  }

  const now = new Date();
  const diff = high.date - now;

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);

  document.getElementById("timer").textContent =
    `${h}h ${String(m).padStart(2,"0")}m`;

  document.getElementById("nextTime").textContent =
    high.date.toLocaleTimeString("fr-FR", {
      hour:"2-digit",
      minute:"2-digit"
    });

  const prev = previousEvent();

  if(prev && prev.type === "low"){
    document.getElementById("status").textContent = "Marée montante";
  } else {
    document.getElementById("status").textContent = "Marée descendante";
  }

  if(diff <= 2 * 3600000){
    document.getElementById("status").textContent = "Bon créneau pêche / canoë";
    document.getElementById("status").style.color = "#34c759";
    document.getElementById("status").style.background = "rgba(52,199,89,.14)";
  }

  const cycle = 12.4167 * 3600000;
  drawWave(1 - Math.min(diff / cycle, 1));
}

loadData();
setInterval(update, 1000);
</script>

</body>
</html>
