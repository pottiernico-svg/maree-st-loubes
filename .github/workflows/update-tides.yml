name: Update tides

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/update-tides.js

      - name: Commit updated tides
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/tides.json
          git commit -m "Update tide data" || echo "No changes"
          git push
